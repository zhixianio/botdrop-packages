name: Build Sharp Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for auto-generated)'
        required: false
        default: ''
      sharp_addon_deb:
        description: 'Optional sharp-node-addon .deb (file path or URL)'
        required: false
        default: ''
      require_sharp_addon:
        description: 'Fail if sharp-node-addon is not available'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      update_latest:
        description: 'Update packages-latest alias on manual dispatch'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      force_push_latest:
        description: 'Force update packages-latest tag (useful for tests and retries)'
        required: false
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
  push:
    branches:
      - master
    paths:
      - 'scripts/build-sharp-packages.sh'
      - 'scripts/create-botdrop-repo.sh'
      - '.github/workflows/build-sharp-packages.yml'

permissions:
  contents: write

jobs:
  build-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1000

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h

          # Remove unnecessary packages
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli google-cloud-sdk hhvm google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean

          # Remove large directories
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true

          echo "Disk space after cleanup:"
          df -h

      - name: Build sharp packages in Docker
        run: |
          echo "Starting package build..."
          ./scripts/run-docker.sh ./scripts/build-sharp-packages.sh aarch64 ./debs-output

      - name: Resolve sharp-node-addon source
        id: sharp_addon
        env:
          GH_TOKEN: ${{ github.token }}
          SHARP_ADDON_INPUT: ${{ github.event.inputs.sharp_addon_deb }}
        run: |
          addon_source=""
          addon_file=""

          if [ -n "$SHARP_ADDON_INPUT" ]; then
            addon_source="$SHARP_ADDON_INPUT"
          else
            tmp_dir="$RUNNER_TEMP/sharp-addon"
            mkdir -p "$tmp_dir"
            if gh release download packages-latest -p "sharp-node-addon_*_aarch64.deb" -D "$tmp_dir" --clobber; then
              addon_file="$(find "$tmp_dir" -maxdepth 1 -name 'sharp-node-addon_*_aarch64.deb' -print -quit)"
              if [ -n "$addon_file" ]; then
                addon_source="$addon_file"
              fi
            fi
          fi

          echo "source=${addon_source}" >> "$GITHUB_OUTPUT"
          if [ -n "$addon_source" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import sharp-node-addon (.deb)
        if: steps.sharp_addon.outputs.enabled == 'true'
        run: |
          ./scripts/import-sharp-addon.sh "${{ steps.sharp_addon.outputs.source }}" ./debs-output

      - name: Handle missing sharp-node-addon
        if: steps.sharp_addon.outputs.enabled != 'true'
        run: |
          if [ "${{ github.event.inputs.require_sharp_addon }}" = "true" ]; then
            echo "sharp-node-addon not found but require_sharp_addon=true"
            exit 1
          fi
          echo "No sharp-node-addon imported (optional)."

      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -lh ./debs-output/*.deb 2>/dev/null || {
            echo "❌ No .deb files found in debs-output/"
            exit 1
          }

          echo "✅ Found $(ls -1 ./debs-output/*.deb | wc -l) .deb files"

      - name: Create APT repository
        run: |
          echo "Creating APT repository..."
          chmod +x ./scripts/create-botdrop-repo.sh
          ./scripts/create-botdrop-repo.sh ./debs-output ./botdrop-repo aarch64

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: botdrop-repo-aarch64
          path: botdrop-repo-aarch64.zip
          retention-days: 30
          compression-level: 0  # Already compressed

  publish:
    needs: build-packages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download repository artifact
        uses: actions/download-artifact@v4
        with:
          name: botdrop-repo-aarch64
          path: ./

      - name: Validate repository manifest
        run: |
          unzip -q -d /tmp/botdrop-repo-validate botdrop-repo-aarch64.zip
          if [ "${{ github.event.inputs.require_sharp_addon }}" = "true" ]; then
            if ! grep -q '^Package: sharp-node-addon$' /tmp/botdrop-repo-validate/dists/stable/main/binary-aarch64/Packages; then
              echo "sharp-node-addon missing from repository manifest"
              exit 1
            fi
            echo "✅ sharp-node-addon found in repository manifest"
          else
            echo "Optional package validation skipped for sharp-node-addon."
          fi

      - name: Generate release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            # Auto-generate tag: packages-YYYY.MM.DD-rN
            BASE_TAG="packages-$(date '+%Y.%m.%d')"

            # Find existing tags with same date
            EXISTING=$(git tag -l "${BASE_TAG}*" | sort -V | tail -1 || echo "")

            if [ -n "$EXISTING" ]; then
              # Extract revision number and increment
              REV=$(echo "$EXISTING" | grep -oE 'r[0-9]+$' | sed 's/r//' || echo "0")
              REV=$((REV + 1))
              TAG="${BASE_TAG}-r${REV}"
            else
              TAG="${BASE_TAG}-r1"
            fi
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated release tag: $TAG"

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Release ${{ steps.tag.outputs.tag }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Release ${{ steps.tag.outputs.tag }} does not exist, will create"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get package count from repository
          REPO_ZIP="botdrop-repo-aarch64.zip"
          PKG_COUNT=$(unzip -l "$REPO_ZIP" | grep -c '\.deb$' || echo "unknown")

          # Get archive size
          ARCHIVE_SIZE=$(du -h "$REPO_ZIP" | cut -f1)

          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "BotDrop Packages - ${{ steps.tag.outputs.tag }}" \
            --notes "## BotDrop Package Repository

          This release contains a custom APT repository for BotDrop with sharp/libvips support.

          ### 📦 Contents
          - **Packages:** $PKG_COUNT .deb files
          - **Architecture:** aarch64
          - **Archive size:** $ARCHIVE_SIZE

          ### 🎯 Included Software
          - \`libvips\` - Image processing library (core of sharp)
          - 26 image format dependencies (JPEG, PNG, WebP, HEIF, etc.)
          - 6 build tools (needed when npm builds sharp from source)

          ### 📱 Usage (Automatic)
          BotDrop app automatically configures this repository on first launch.
          Users can then install packages with:
          \`\`\`bash
          pkg update
          pkg install libvips
          npm install sharp
          \`\`\`

          ### 🔧 Manual Configuration (Advanced)
          If you need to manually configure the repository:
          \`\`\`bash
          echo 'deb https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/ stable main' > \$PREFIX/etc/apt/sources.list.d/botdrop-packages.list
          pkg update
          \`\`\`

          ### 🏗️ Build Information
          - **Built:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - **Commit:** ${{ github.sha }}
          - **Workflow:** ${{ github.run_id }}

          ---
          *Built with BotDrop package build system*" \
            "$REPO_ZIP"

          echo "✅ Release created successfully: ${{ steps.tag.outputs.tag }}"

      - name: Update packages-latest tag
        if: steps.check_release.outputs.exists == 'false' && (github.ref == 'refs/heads/master' || github.event.inputs.update_latest == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          START_TS=$(date +%s)
          REPO_ZIP="botdrop-repo-aarch64.zip"
          CURRENT_TAG="${{ steps.tag.outputs.tag }}"
          FORCE_PUSH="${{ github.event.inputs.force_push_latest }}"
          UPDATED_LATEST="false"

          echo "Starting packages-latest update workflow"
          echo "- Current branch/ref: ${GITHUB_REF}"
          echo "- Current commit: ${GITHUB_SHA}"
          echo "- Release tag: ${CURRENT_TAG}"
          echo "- force_push_latest: ${FORCE_PUSH}"

          # Keep local and remote tags in sync before forcing the alias update
          git fetch --tags origin

          # Create/overwrite packages-latest to point to current commit
          git tag -f packages-latest "${GITHUB_SHA}"

          if [ "${FORCE_PUSH}" = "true" ]; then
            git push --force origin packages-latest
          else
            git push origin packages-latest
          fi

          # Keep packages-latest release in sync with alias content
          if gh release view packages-latest >/dev/null 2>&1; then
            gh release view packages-latest --json assets -q '.assets[].name' |
              xargs -r -I {} gh release delete-asset packages-latest {} -y || true
            gh release upload packages-latest "$REPO_ZIP" --clobber
          else
            gh release create packages-latest \
              --title "BotDrop Packages - Latest" \
              --notes "Stable alias for the latest packaged repository (aarch64)." \
              "$REPO_ZIP"
          fi

          UPDATED_LATEST="true"

          END_TS=$(date +%s)
          DURATION=$(( END_TS - START_TS ))

          echo "✅ Updated packages-latest to commit ${GITHUB_SHA}"
          echo "Latest alias tag now points to: $CURRENT_TAG"
          echo "Update elapsed: ${DURATION}s"
          echo "Updated packages-latest: ${UPDATED_LATEST}"
