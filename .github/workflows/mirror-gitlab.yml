name: Mirror to GitLab

on:
  push:
    branches: ['**']
    tags: ['**']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Track all remote branches
        run: |
          for branch in $(git branch -r | grep -v HEAD | sed 's|origin/||'); do
            git branch --track "$branch" "origin/$branch" 2>/dev/null || true
          done

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/lay2dev/botdrop-packages.git
          git push gitlab --all --force
          git push gitlab --tags --force

      - name: Deploy GitLab Pages
        if: contains(github.ref, 'gh-pages')
        run: |
          git checkout gh-pages
          tar -czf pages.tar.gz --exclude=.git --exclude=.gitlab-ci.yml .
          curl -s --fail \
            --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
            --form "file=@pages.tar.gz" \
            "https://gitlab.com/api/v4/projects/lay2dev%2Fbotdrop-packages/pages" \
            || echo "Pages API deploy failed"
